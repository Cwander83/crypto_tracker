<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoTrack</title>
    <!-- Prevent flash of wrong theme: apply .dark before first paint -->
    <script>
      ;(function () {
        var t = localStorage.getItem('ct_theme')
        if (t === 'light') document.documentElement.classList.remove('dark')
        else document.documentElement.classList.add('dark')
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
